<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PronounceAI – Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
</head>
<body class="auth-page">

  <div class="phone-frame">
    <div class="status-bar">
      <span>9:41</span>
      <span class="status-icons">
        <i class="ti ti-wifi"></i>
        <i class="ti ti-battery"></i>
      </span>
    </div>

    <div class="screen-body">

      <!-- Logo -->
      <div class="logo-block">
        <div class="app-logo">
          <i class="ti ti-speakerphone"></i>
        </div>
        <h1 class="app-name">PronounceAI</h1>
        <p class="app-tagline">Speak better, every day</p>
      </div>

      <!-- Form -->
      <form class="login-form" onsubmit="handleLogin(event)">

        <div class="form-group" id="emailGroup">
          <label class="form-label">
            <i class="ti ti-mail"></i> Email address
          </label>
          <input
            type="email"
            id="emailInput"
            class="form-input"
            placeholder="you@email.com"
            oninput="validateEmail(this)"
          />
          <span class="error-msg" id="emailError">
            <i class="ti ti-alert-circle"></i> Enter a valid email address
          </span>
        </div>

        <div class="form-group">
          <label class="form-label">
            <i class="ti ti-lock"></i> Password
          </label>
          <div class="input-wrap">
            <input
              type="password"
              id="passInput"
              class="form-input"
              placeholder="••••••••"
            />
            <button type="button" class="eye-btn" onclick="togglePass()">
              <i class="ti ti-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <a href="#" class="forgot-link">Forgot password?</a>

        <button type="submit" class="btn-primary">Sign in</button>

        <div class="divider">
          <span class="divider-line"></span>
          <span class="divider-text">or</span>
          <span class="divider-line"></span>
        </div>

        <a href="onboarding.html" class="btn-social">
          <i class="ti ti-brand-google"></i> Continue with Google
        </a>

      </form>

      <p class="signup-link">Don't have an account? <a href="onboarding.html">Sign up free</a></p>

    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
